name: QA Automation Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-tests/package.json

      - name: Install API dependencies
        working-directory: api-tests
        run: npm install

      - name: Run Newman collection with HTML report
        working-directory: api-tests
        run: npm run test:api:html

      - name: Upload API HTML report
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: api-tests/reports/
          if-no-files-found: error

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e-tests/package.json

      - name: Install E2E dependencies
        working-directory: e2e-tests
        run: npm install

      - name: Run Cypress suite
        working-directory: e2e-tests
        env:
          E2E_BASE_URL: https://www.saucedemo.com
        run: npm run test:e2e

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: e2e-tests/cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: e2e-tests/cypress/videos
          if-no-files-found: ignore

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 performance suite
        env:
          PERFORMANCE_BASE_URL: https://petstore.swagger.io/v2/pet
        run: k6 run performance-tests/performance-test.js
